<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>two-do · dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0e0b0a;
    --panel:  #161210;
    --border: rgba(201,123,99,0.12);
    --rose:   #c97b63;
    --blush:  #e8c4b0;
    --muted:  #6b5148;
    --sage:   #7a9e8c;
    --cream:  #f0e6dc;
    --done:   #3a3330;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* Subtle animated background */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(201,123,99,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(122,158,140,0.05) 0%, transparent 50%);
    animation: breathe 12s ease-in-out infinite alternate;
  }
  @keyframes breathe {
    from { opacity:0.6; }
    to   { opacity:1; }
  }

  /* Grain overlay */
  body::after {
    content:'';
    position:fixed; inset:0; z-index:0; opacity:0.04; pointer-events:none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .dashboard {
    position: relative; z-index:1;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    padding: 48px 56px;
    gap: 32px;
  }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    animation: fadeIn 1s ease both;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 300;
    color: var(--cream);
    letter-spacing: -0.02em;
  }

  .logo em {
    font-style: italic;
    color: var(--rose);
  }

  .clock-block { text-align: right; }

  .time {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .date {
    font-size: clamp(0.65rem, 1.2vw, 0.85rem);
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Panels ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 1s ease both;
  }

  .panel:nth-child(2) { animation-delay: 0.1s; }
  .panel:nth-child(3) { animation-delay: 0.2s; }

  .panel-title {
    font-size: clamp(0.6rem, 1vw, 0.75rem);
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--muted);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Todo list ── */
  .todo-list {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .section-head {
    font-size: clamp(0.55rem, 0.9vw, 0.68rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin: 18px 0 10px;
  }

  .section-head:first-child { margin-top: 0; }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(201,123,99,0.06);
    animation: slideIn 0.4s ease both;
  }

  .todo-item:last-child { border-bottom: none; }

  .todo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid var(--rose);
    flex-shrink: 0;
  }

  .todo-item.done .todo-dot {
    background: var(--done);
    border-color: var(--muted);
  }

  .todo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 2vw, 1.6rem);
    font-weight: 300;
    color: var(--cream);
    line-height: 1.2;
    flex: 1;
  }

  .todo-item.done .todo-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--done);
  }

  .todo-author {
    font-size: clamp(0.55rem, 0.85vw, 0.7rem);
    color: var(--muted);
    flex-shrink: 0;
    letter-spacing: 0.08em;
  }

  .todo-cat {
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    flex-shrink: 0;
  }

  /* ── Stats / done panel ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    flex: 1;
  }

  .stat-card {
    background: rgba(201,123,99,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 6vw, 5rem);
    font-weight: 300;
    color: var(--cream);
    line-height: 1;
  }

  .stat-num.rose  { color: var(--rose); }
  .stat-num.sage  { color: var(--sage); }
  .stat-num.muted { color: var(--muted); }

  .stat-label {
    font-size: clamp(0.6rem, 1vw, 0.72rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Progress bar */
  .progress-wrap {
    grid-column: 1 / -1;
    background: rgba(201,123,99,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: clamp(0.6rem, 1vw, 0.72rem);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }

  .progress-bar {
    height: 6px;
    background: rgba(201,123,99,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--rose), var(--sage));
    border-radius: 3px;
    transition: width 1s ease;
  }

  /* Done items list in right panel */
  .done-list {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Sync dot */
  .sync {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 20px;
    flex-shrink: 0;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sage);
    animation: pulse 2s infinite;
  }

  .sync-dot.error { background: #c06060; animation: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes fadeIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>
<div class="dashboard">

  <!-- Header -->
  <div class="header">
    <div class="logo">two<em>-do</em> ♡</div>
    <div class="clock-block">
      <div class="time" id="clock">--:--</div>
      <div class="date" id="date-label">loading...</div>
    </div>
  </div>

  <!-- Left panel: To Do -->
  <div class="panel">
    <div class="panel-title">to do</div>
    <div class="todo-list" id="todo-list">
      <div style="color:var(--muted);font-size:0.9rem">loading...</div>
    </div>
    <div class="sync">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">connecting</span>
    </div>
  </div>

  <!-- Right panel: Stats + Done -->
  <div class="panel">
    <div class="panel-title">progress</div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num rose" id="stat-left">—</div>
        <div class="stat-label">still to do</div>
      </div>
      <div class="stat-card">
        <div class="stat-num sage" id="stat-done">—</div>
        <div class="stat-label">done</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>progress</span>
          <span id="stat-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Recently done -->
    <div class="panel-title" style="margin-top:24px">recently done</div>
    <div class="done-list" id="done-list">
      <div style="color:var(--muted);font-size:0.9rem">nothing done yet</div>
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────
let tasks = [];
let lastChangeTs = 0;
let polling = false;

// ── Boot ───────────────────────────────────────────────
(async function init() {
  tickClock();
  setInterval(tickClock, 1000);
  await fetchTasks();
  startPolling();
})();

// ── Clock ──────────────────────────────────────────────
function tickClock() {
  const now  = new Date();
  const h    = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12  = h % 12 || 12;
  document.getElementById('clock').textContent = `${h12}:${String(m).padStart(2,'0')} ${ampm}`;

  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date-label').textContent =
    `${days[now.getDay()]}  ·  ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}

// ── API ────────────────────────────────────────────────
async function fetchTasks() {
  try {
    const res = await fetch('/api/tasks');
    tasks = await res.json();
    setSyncStatus('ok', 'live');
    render();
  } catch(e) { setSyncStatus('error', 'offline'); }
}

async function startPolling() {
  if (polling) return;
  polling = true;
  while (true) {
    try {
      const res  = await fetch(`/api/poll/${lastChangeTs}`);
      const data = await res.json();
      if (data.changed) {
        tasks = data.tasks;
        lastChangeTs = data.ts;
        render();
        setSyncStatus('ok', 'updated');
        setTimeout(() => setSyncStatus('ok', 'live'), 2000);
      } else {
        lastChangeTs = data.ts;
        setSyncStatus('ok', 'live');
      }
    } catch(e) {
      setSyncStatus('error', 'reconnecting...');
      await sleep(3000);
    }
  }
}

// ── Render ─────────────────────────────────────────────
function render() {
  const todo = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  const total = tasks.length;
  const pct   = total ? Math.round((done.length / total) * 100) : 0;

  // Stats
  document.getElementById('stat-left').textContent  = todo.length;
  document.getElementById('stat-done').textContent  = done.length;
  document.getElementById('stat-pct').textContent   = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  // Todo list — group by author
  const todoList = document.getElementById('todo-list');
  if (!todo.length) {
    todoList.innerHTML = `<div style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,2.5vw,1.8rem);font-weight:300;color:var(--muted);font-style:italic;margin-top:12px">all caught up ♡</div>`;
  } else {
    // Show up to ~8 items so they fit on screen
    const visible = todo.slice(0, 8);
    const hidden  = todo.length - visible.length;
    let html = visible.map(t => `
      <div class="todo-item">
        <div class="todo-dot"></div>
        <div class="todo-cat">${t.cat}</div>
        <div class="todo-text">${esc(t.text)}</div>
        <div class="todo-author">${authorLabel(t.author)}</div>
      </div>`).join('');
    if (hidden > 0) {
      html += `<div style="font-size:0.7rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;padding-top:14px">+ ${hidden} more</div>`;
    }
    todoList.innerHTML = html;
  }

  // Done list — last 5 completed
  const doneList = document.getElementById('done-list');
  if (!done.length) {
    doneList.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;font-style:italic">nothing done yet</div>`;
  } else {
    doneList.innerHTML = done.slice(0, 5).map(t => `
      <div class="todo-item done">
        <div class="todo-dot"></div>
        <div class="todo-cat">${t.cat}</div>
        <div class="todo-text">${esc(t.text)}</div>
        <div class="todo-author">${authorLabel(t.author)}</div>
      </div>`).join('');
  }
}

// ── Helpers ────────────────────────────────────────────
function authorLabel(a) {
  return a==='you' ? '🌸' : a==='her' ? '💛' : '💑';
}

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = `sync-dot ${state==='error'?'error':''}`;
  document.getElementById('sync-label').textContent = label;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
